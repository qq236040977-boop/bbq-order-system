<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>生成PWA图标</title>
<style>
  body { font-family: sans-serif; text-align: center; padding: 40px; background: #f5f5f5; }
  canvas { border: 1px solid #ccc; background: white; margin: 20px; }
  button { padding: 12px 24px; font-size: 16px; background: #FF6B35; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 8px; }
  button:hover { background: #E55A2B; }
  .info { color: #666; margin: 12px 0; }
</style>
</head>
<body>
<h2>🔥 春萍烧烤 PWA 图标生成器</h2>
<p class="info">点击按钮生成图标，自动下载后放到 <code>public/</code> 目录</p>

<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>

<br>
<button onclick="generateIcons()">🎨 生成图标</button>
<button onclick="downloadIcons()">⬇️ 下载图标</button>

<p class="info" id="status">准备就绪，点击"生成图标"开始</p>

<script>
function drawIcon(ctx, size) {
  // 背景渐变
  const gradient = ctx.createLinearGradient(0, 0, 0, size);
  gradient.addColorStop(0, '#FF6B35');
  gradient.addColorStop(1, '#E55A2B');
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();

  // 烧烤图案 - 简化版
  ctx.fillStyle = 'white';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // 主文字 "烧"
  ctx.font = `bold ${size * 0.5}px sans-serif`;
  ctx.fillText('烧', size / 2, size / 2 - size * 0.1);

  // 副文字 "烤"
  ctx.font = `bold ${size * 0.3}px sans-serif`;
  ctx.fillText('烤', size / 2, size / 2 + size * 0.25);

  // 装饰圆点（模拟火花）
  ctx.fillStyle = '#FFB800';
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI * 2 / 6) * i;
    const x = size / 2 + Math.cos(angle) * size * 0.38;
    const y = size / 2 + Math.sin(angle) * size * 0.38;
    ctx.beginPath();
    ctx.arc(x, y, size * 0.04, 0, Math.PI * 2);
    ctx.fill();
  }
}

function generateIcons() {
  const c192 = document.getElementById('c192');
  const ctx192 = c192.getContext('2d');
  drawIcon(ctx192, 192);

  const c512 = document.getElementById('c512');
  const ctx512 = c512.getContext('2d');
  drawIcon(ctx512, 512);

  document.getElementById('status').innerText = '✅ 图标已生成！点击"下载图标"保存到 public/ 目录';
}

function downloadIcons() {
  const c192 = document.getElementById('c192');
  const c512 = document.getElementById('c512');

  // 下载 192
  const a1 = document.createElement('a');
  a1.href = c192.toDataURL('image/png');
  a1.download = 'icon-192.png';
  a1.click();

  // 下载 512
  const a2 = document.createElement('a');
  a2.href = c512.toDataURL('image/png');
  a2.download = 'icon-512.png';
  a2.click();

  document.getElementById('status').innerText = '✅ 图标已下载！请放到 public/ 目录下';
}

// 自动生成
generateIcons();
</script>
</body>
</html>
